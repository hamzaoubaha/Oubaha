<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f0f0f0" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="44" height="44" rx="12" ry="12" fill="url(#bg)" stroke="url(#border)" stroke-width="1.5"/>
  <!-- Letter H in dark/bold -->
  <text x="24" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle" fill="#111111" letter-spacing="-1">H</text>
</svg>